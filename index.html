<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Code Gokil</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 class="title">🎮 Belajar Ngoding Jirr</h1>

<div class="game">

<div class="mission">
<h2>🎯 Misi Hari Ini</h2>
<p id="missionText"></p>
</div>

<div class="editor-container">

<h2>📝 Editor HTML</h2>

<textarea id="editor" placeholder="Ketik kode HTML di sini..."></textarea>

<div id="hint"></div>

<button id="runBtn">▶ Jalankan</button>

</div>

<div class="preview-container">
<h2>Preview</h2>
<iframe id="preview"></iframe>
</div>

</div>

<!-- Custom Popup Modal -->
<div id="popupModal" class="popup-modal">
  <div class="popup-content">
    <div class="popup-icon" id="popupIcon"></div>
    <div class="popup-message" id="popupMessage"></div>
    <button class="popup-btn" id="popupBtn">Lanjut</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
